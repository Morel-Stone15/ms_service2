<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Tableau de Bord – MS SERVICE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow-container">
        <div class="bg-glow glow-1"></div>
        <div class="bg-glow glow-2"></div>
        <div class="bg-glow glow-3"></div>
    </div>

    <div class="dashboard-layout">
        <div class="auth-card" style="max-width:860px; width:100%;">

            <!-- Header -->
            <div class="card-header-flex mb-4">
                <div>
                    <h1 style="font-size:1.5rem; margin-bottom:4px;">
                        Bienvenue, <span id="userName" class="text-glow"></span> !
                    </h1>
                    <p style="color:var(--text-muted); font-size:0.85rem;" id="userEmail"></p>
                </div>
                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <span class="status-blue" id="userRole"></span>
                    <button id="logoutBtn" class="btn btn-secondary" style="padding:7px 14px; font-size:0.82rem;">
                        <i data-lucide="log-out"></i> Déconnexion
                    </button>
                </div>
            </div>

            <!-- Stats row -->
            <div class="grid grid-4" style="gap:16px; margin-bottom:32px;" id="statsRow">
                <div class="stat-card" style="background:var(--bg-card); padding:16px; border-radius:var(--radius-md); border:1px solid var(--border); text-align:center;">
                    <span class="stat-number text-glow" id="statTotal" style="font-size:2rem; font-weight:700; font-family:var(--font-title);">0</span>
                    <span style="display:block; color:var(--text-soft); font-size:0.82rem; margin-top:4px;">Commandes</span>
                </div>
                <div class="stat-card" style="background:var(--bg-card); padding:16px; border-radius:var(--radius-md); border:1px solid var(--border); text-align:center;">
                    <span class="stat-number" id="statPending" style="font-size:2rem; font-weight:700; font-family:var(--font-title); color:var(--warning);">0</span>
                    <span style="display:block; color:var(--text-soft); font-size:0.82rem; margin-top:4px;">En attente</span>
                </div>
                <div class="stat-card" style="background:var(--bg-card); padding:16px; border-radius:var(--radius-md); border:1px solid var(--border); text-align:center;">
                    <span class="stat-number" id="statValidated" style="font-size:2rem; font-weight:700; font-family:var(--font-title); color:var(--success);">0</span>
                    <span style="display:block; color:var(--text-soft); font-size:0.82rem; margin-top:4px;">Validés</span>
                </div>
                <div class="stat-card" style="background:var(--bg-card); padding:16px; border-radius:var(--radius-md); border:1px solid var(--border); text-align:center;">
                    <span class="stat-number" id="statDelivered" style="font-size:2rem; font-weight:700; font-family:var(--font-title); color:var(--primary);">0</span>
                    <span style="display:block; color:var(--text-soft); font-size:0.82rem; margin-top:4px;">Livrés</span>
                </div>
            </div>

            <!-- Orders -->
            <h2 style="font-family:var(--font-title); margin-bottom:16px; font-size:1.1rem;">Mes commandes</h2>
            <div class="pricing-table-container">
                <div class="pricing-table-wrapper">
                    <table class="pricing-table" id="ordersTable">
                        <thead>
                            <tr>
                                <th>Service</th>
                                <th>Montant</th>
                                <th>Statut</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <p id="noOrders" class="text-muted-center" style="display:none;">
                Aucune commande pour le moment. <a href="index.html#services" style="color:var(--primary);">Voir les services →</a>
            </p>

            <!-- Actions -->
            <div style="display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:28px; padding-top:24px; border-top:1px solid var(--border);">
                <a href="index.html" class="btn btn-secondary">
                    <i data-lucide="arrow-left"></i> Retour au site
                </a>
                <a href="index.html#services" class="btn btn-secondary">
                    <i data-lucide="shopping-bag"></i> Passer une commande
                </a>
                <button id="devisBtn" class="btn btn-primary btn-glow">
                    <i data-lucide="mail"></i> Demande de Devis
                </button>
            </div>

            <!-- Devis feedback -->
            <p id="devisMsg" style="text-align:center; margin-top:14px; font-size:0.88rem; display:none;"></p>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <script src="auth.js"></script>
    <script>
        if (!Auth.requireAuth()) { /* redirected */ }

        const user = Auth.getCurrentUser();
        if (user) {
            document.getElementById('userName').textContent = user.nom;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userRole').textContent = user.role === 'admin' ? '🛡️ Administrateur' : '👤 Client';
        }

        async function loadOrders() {
            const orders = await Auth.getMyOrders();
            const tbody  = document.querySelector('#ordersTable tbody');
            const noOrders  = document.getElementById('noOrders');
            const tbl    = document.getElementById('ordersTable');
            tbody.innerHTML = '';

            // Stats
            document.getElementById('statTotal').textContent     = orders.length;
            document.getElementById('statPending').textContent   = orders.filter(o => o.statut === 'En attente').length;
            document.getElementById('statValidated').textContent = orders.filter(o => o.statut === 'Validé').length;
            document.getElementById('statDelivered').textContent = orders.filter(o => o.statut === 'Livré').length;

            if (orders.length === 0) {
                noOrders.style.display = 'block';
                tbl.style.display = 'none';
            } else {
                noOrders.style.display = 'none';
                tbl.style.display = 'table';
                [...orders].reverse().forEach(o => {
                    const statusClass = o.statut === 'Livré' || o.statut === 'Validé' ? 'status-active' : o.statut === 'En attente' ? 'status-pending' : 'status-suspended';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${o.service || '—'}</td>
                        <td style="font-family:var(--font-title);">${o.montant ? o.montant + (o.montant.includes('FCFA') ? '' : ' FCFA') : '—'}</td>
                        <td><span class="status-badge ${statusClass}">${o.statut}</span></td>
                        <td style="color:var(--text-muted); font-size:0.82rem;">${new Date(o.date_commande).toLocaleDateString('fr-FR')}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }
        loadOrders();

        // Bouton Devis
        document.getElementById('devisBtn').addEventListener('click', async function() {
            const btn   = this;
            const msgEl = document.getElementById('devisMsg');
            const orig  = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span>⏳ Envoi...</span>';

            const u = Auth.getCurrentUser();
            const nom   = u?.nom   || '—';
            const phone = u?.phone || u?.telephone || '—';
            const email = u?.email || '—';
            const msg   = `Demande de devis depuis le tableau de bord. Client : ${nom} | Email : ${email} | Tél : ${phone}`;

            let sent = false;

            // Essai 1 : backend Flask SMTP
            try {
                const r = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nom, phone, email, subject: 'Demande de devis tableau de bord', message: msg })
                });
                const d = await r.json();
                if (d.success) sent = true;
            } catch {}

            // Essai 2 : WhatsApp si tout échoue
            msgEl.style.display = 'block';
            if (sent) {
                btn.style.background = 'linear-gradient(135deg,#00ffb3,#00e5ff)';
                btn.innerHTML = '<span>✓ Demande envoyée !</span>';
                msgEl.style.color = 'var(--success)';
                msgEl.textContent = "Demande envoyée à morelstone15@gmail.com. Nous vous répondrons sous peu.";
            } else {
                const waText = encodeURIComponent(`Bonjour MS SERVICE !\nNom : ${nom}\nEmail : ${email}\nTél : ${phone}\nDemande de devis.`);
                window.open(`https://wa.me/241074083695?text=${waText}`, '_blank');
                btn.style.background = 'linear-gradient(135deg,#25d366,#128c7e)';
                btn.innerHTML = '<span>📱 Redirigé vers WhatsApp</span>';
                msgEl.style.color = 'var(--success)';
                msgEl.textContent = "WhatsApp ouvert avec vos informations pré-remplies.";
            }

            setTimeout(() => {
                btn.innerHTML = orig; btn.style.background = '';
                btn.disabled = false; lucide.createIcons();
            }, 4000);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            Auth.clear();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
